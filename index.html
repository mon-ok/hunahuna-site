    <!-- Typeface pairing: high-contrast serif headings (Playfair Display) +
         clean geometric sans for UI (Jost), with Cormorant Garamond for a few
         display accents. preconnect keeps the fetch off the critical path;
         display=swap avoids invisible-text flashes. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

  </head>
