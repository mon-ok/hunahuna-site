<?xml version="1.0" encoding="UTF-8"?>
<!-- PLACEHOLDER demo image — strong vertical bands so the horizontal scroll
     pan is obvious. Swap for your real /placeholder-about.jpg photo. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cc3e0"/>
      <stop offset="0.6" stop-color="#1167b1"/>
      <stop offset="1" stop-color="#0b3d91"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <!-- vertical reference bands -->
  <g fill="#ffffff" opacity="0.10">
    <rect x="0"    width="100" height="1000"/>
    <rect x="200"  width="100" height="1000"/>
    <rect x="400"  width="100" height="1000"/>
    <rect x="600"  width="100" height="1000"/>
    <rect x="800"  width="100" height="1000"/>
    <rect x="1000" width="100" height="1000"/>
    <rect x="1200" width="100" height="1000"/>
    <rect x="1400" width="100" height="1000"/>
  </g>
  <circle cx="1180" cy="300" r="120" fill="#ffffff" opacity="0.85"/>
  <text x="800" y="540" font-family="Georgia, serif" font-size="120" fill="#ffffff" text-anchor="middle" opacity="0.9">Our Story</text>
  <text x="800" y="640" font-family="sans-serif" font-size="40" fill="#ffffff" text-anchor="middle" opacity="0.7">scroll — the image pans right</text>
</svg>
